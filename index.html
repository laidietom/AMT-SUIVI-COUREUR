<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AMT 2026 — Suivi des points</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1714; --bg2:#13201b; --surface:#172a23; --surface2:#1d3329;
  --line:rgba(255,255,255,.09); --paper:#f5f2ea; --ink:#0d1512;
  --muted:#9cb2a7; --muted2:#7a9187; --text:#eef3f0;
  --accent:#ff7a18;
  --cat-S:#2f6fed; --cat-PS:#e11d48; --cat-R:#16a34a; --cat-RAVITO:#0d9488;
  --disp:"Barlow Condensed",Impact,"Arial Narrow",sans-serif;
  --body:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit}
.hide{display:none!important}

/* ---------- HOME ---------- */
#home{min-height:100%;position:relative;overflow:hidden}
.hero{position:relative;padding:clamp(40px,7vh,86px) 22px 26px;text-align:center;overflow:hidden}
.contour{position:absolute;inset:-20% -10% auto -10%;height:140%;width:120%;opacity:.5;pointer-events:none;z-index:0}
.contour path{fill:none;stroke:rgba(120,200,160,.10);stroke-width:1.2}
.hero-inner{position:relative;z-index:1;max-width:1080px;margin:0 auto}
.eyebrow{font-family:var(--disp);letter-spacing:.32em;text-transform:uppercase;font-weight:600;font-size:13px;color:var(--accent);margin:0 0 10px}
.hero h1{font-family:var(--disp);font-weight:800;font-size:clamp(44px,9vw,96px);line-height:.92;letter-spacing:-.01em;margin:0;text-transform:uppercase}
.hero h1 .yr{color:var(--accent)}
.hero p.sub{margin:16px auto 0;max-width:560px;color:var(--muted);font-size:clamp(15px,2.2vw,18px);line-height:1.5}
.ridge{display:block;width:100%;height:60px;color:var(--bg2)}

.courses-wrap{background:var(--bg2);padding:8px 18px 60px}
.section-label{max-width:1080px;margin:8px auto 18px;display:flex;align-items:baseline;gap:14px}
.section-label .n{font-family:var(--disp);font-weight:700;font-size:14px;color:var(--muted2);letter-spacing:.06em}
.section-label .t{font-family:var(--disp);font-weight:700;font-size:clamp(20px,3vw,26px);text-transform:uppercase;letter-spacing:.02em}
.section-label .rule{flex:1;height:1px;background:var(--line)}

.grid{max-width:1080px;margin:0 auto;display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 22px 20px;cursor:pointer;overflow:hidden;
  transition:transform .25s cubic-bezier(.2,.7,.3,1),border-color .25s,background .25s;
  opacity:0;transform:translateY(14px);animation:rise .5s forwards}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.12s}
.card:nth-child(3){animation-delay:.19s}.card:nth-child(4){animation-delay:.26s}.card:nth-child(5){animation-delay:.33s}
@keyframes rise{to{opacity:1;transform:none}}
.card:hover{transform:translateY(-4px);background:var(--surface2);border-color:rgba(255,255,255,.18)}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.card .bar{position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c)}
.card .code{font-family:var(--disp);font-weight:800;font-size:clamp(34px,6vw,46px);line-height:.9;text-transform:uppercase;letter-spacing:-.01em}
.card .full{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:2px 0 16px}
.card .stats{display:flex;flex-wrap:wrap;gap:8px 18px;font-family:var(--disp);font-weight:600;letter-spacing:.02em}
.card .stat{display:flex;flex-direction:column;line-height:1}
.card .stat b{font-size:22px;color:var(--text)}
.card .stat span{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.12em;margin-top:5px;font-family:var(--body);font-weight:600}
.card .foot{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.card .pts{font-size:13px;color:var(--muted)}
.card .pts b{color:var(--text)}
.card .go{font-family:var(--disp);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--c);display:flex;align-items:center;gap:6px}
.card .go svg{width:16px;height:16px;transition:transform .25s}
.card:hover .go svg{transform:translateX(4px)}
.start{font-size:12.5px;color:var(--muted2);margin-top:10px}
.start b{color:var(--muted);font-weight:600}

.footnote{max-width:1080px;margin:34px auto 0;color:var(--muted2);font-size:12.5px;line-height:1.6;border-top:1px solid var(--line);padding-top:20px}

/* ---------- MAP VIEW ---------- */
#mapview{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);z-index:1000}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--line);z-index:5}
.back{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);color:var(--text);
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.04em;text-transform:uppercase;
  padding:9px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:background .2s,border-color .2s}
.back:hover{background:var(--surface2);border-color:rgba(255,255,255,.2)}
.back:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.titleblock{display:flex;align-items:center;gap:10px;min-width:0}
.titleblock .dot{width:13px;height:13px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.08)}
.titleblock .tt{min-width:0}
.titleblock .tt .a{font-family:var(--disp);font-weight:800;font-size:22px;line-height:1;text-transform:uppercase;letter-spacing:-.01em}
.titleblock .tt .b{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.switcher{margin-left:auto;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.switcher::-webkit-scrollbar{display:none}
.pill{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;
  padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.18s}
.pill:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.pill.active{color:#0d1512;background:var(--c);border-color:var(--c);font-weight:700}

#map{flex:1;width:100%;background:#aadaff}
.leaflet-container{font-family:var(--body)}

/* marker badges */
.mk{display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;color:#fff;
  font-size:11px;letter-spacing:.02em;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45);width:30px;height:30px;border-radius:50%;
  transition:transform .15s}
.mk:hover{transform:scale(1.12);z-index:1000}
.mk.cat-PS{border-radius:7px}
.mk.cat-RAVITO{width:22px;height:22px;border-radius:50%}
.mk.cat-RAVITO::after{content:"";width:9px;height:9px;border:2px solid #fff;border-radius:2px;transform:rotate(45deg)}
.mk-S{background:var(--cat-S)} .mk-PS{background:var(--cat-PS)} .mk-R{background:var(--cat-R)} .mk-RAVITO{background:var(--cat-RAVITO)}

/* popup */
.leaflet-popup-content-wrapper{border-radius:14px;padding:2px}
.leaflet-popup-content{margin:14px 16px;min-width:188px}
.pop .ptag{display:inline-block;font-family:var(--disp);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.08em;
  color:#fff;padding:3px 9px;border-radius:6px;margin-bottom:8px}
.pop h3{font-family:var(--disp);font-weight:700;font-size:21px;margin:0 0 2px;color:var(--ink);text-transform:uppercase;line-height:1}
.pop .coords{font-size:12px;color:#6b7d74;margin:4px 0 12px;font-variant-numeric:tabular-nums}
.pop a.gm{display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;font-weight:600;font-size:14px;
  padding:11px;border-radius:10px;margin-top:7px}
.pop a.gm.primary{background:var(--accent);color:#fff}
.pop a.gm.primary:hover{filter:brightness(1.07)}
.pop a.gm.ghost{background:#eee7d8;color:var(--ink)}
.pop a.gm.ghost:hover{background:#e3d9c4}
.pop a.gm svg{width:16px;height:16px}

/* legend */
.legend{position:absolute;left:12px;bottom:18px;z-index:500;background:rgba(20,32,27,.94);backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--text);max-width:230px;
  box-shadow:0 6px 24px rgba(0,0,0,.35)}
.legend .lh{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--muted);margin-bottom:9px}
.legend .row{display:flex;align-items:center;gap:9px;margin:6px 0}
.legend .gly{width:16px;height:16px;flex:none;border:2px solid #fff;box-shadow:0 1px 2px rgba(0,0,0,.4)}
.legend .gly.c{border-radius:50%} .legend .gly.sq{border-radius:4px}
.legend .gly.dia{transform:rotate(45deg);border-radius:2px;width:12px;height:12px;margin:2px}
.legend .gly.tr{height:0;border:none;width:22px;border-top:4px solid currentColor;box-shadow:none;border-radius:2px}
.legend .lh{cursor:pointer;user-select:none;margin-bottom:9px}
.legend.collapsed .lh{margin-bottom:0}
.legend.collapsed .body{display:none}
@media(max-width:560px){
  .legend{left:8px;right:8px;bottom:8px;max-width:none}
  .titleblock .tt .b{display:none}
}
@media(prefers-reduced-motion:reduce){.card{animation:none;opacity:1;transform:none}*{transition:none!important}}
</style>
</head>

/* ---------- build home ---------- */
const grid = document.getElementById('grid');

      <div class="stat"><b>${r.dist}</b><span>Distance</span></div>

    </div>
    <div class="start"><b>Départ</b> · ${r.start}</div>
    <div class="foot">
      <div class="pts"><b>${n}</b> points à suivre</div>
      <div class="go">Carte
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </div>
    </div>`;
  el.addEventListener('click', ()=>openCourse(r.id));
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();openCourse(r.id);} });

});
document.getElementById('footnote').innerHTML =
  "Seuls les points figurant sur la feuille « Points suiveurs » <b>et</b> situés sur le tracé de la course concernée sont affichés. " +
  "La carte Supr'AMT ajoute en plus les ravitaillements / barrières horaires propres à l'épreuve. " +
  "Fond cartographique © OpenStreetMap · données coureurs issues des traces GPX de l'organisation.";

/* ---------- map ---------- */
let map, baseLayers, layerCtrl, courseLayer;
function ensureMap(){
  if(map) return;
  const plan = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
    {maxZoom:20, subdomains:'abcd', attribution:'© OpenStreetMap © CARTO'});
  const relief = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
    {maxZoom:19, attribution:'Tiles © Esri'});
  const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {maxZoom:19, attribution:'Tiles © Esri'});
  map = L.map('map',{zoomControl:true, layers:[plan]});
  L.control.layers({"Plan":plan,"Relief":relief,"Satellite":sat},null,{position:'topright'}).addTo(map);
}

function badgeIcon(cat, code){
  const c = CAT[cat];
  const cls = `mk mk-${cat} cat-${cat}`;
  const html = (cat==='RAVITO') ? '' : code;
  const size = (cat==='RAVITO')?22:30;
  return L.divIcon({className:'', html:`<div class="${cls}">${html}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]});
}
function popupHtml(cat, title, sub, lat, lon){
  const c = CAT[cat];
  const subline = sub && sub.toUpperCase()!==title.toUpperCase() ? `<div style="font-size:13px;color:#46554d;margin:-2px 0 2px">${sub}</div>`:'';
  return `<div class="pop">
    <span class="ptag" style="background:${c.hex}">${c.name}</span>
    <h3>${title}</h3>${subline}
    <div class="coords">${(+lat).toFixed(5)}, ${(+lon).toFixed(5)}</div>
    <a class="gm primary" target="_blank" rel="noopener" href="${gdir(lat,lon)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.6-7-11a7 7 0 0 1 14 0c0 4.4-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      Itinéraire Google Maps</a>
    <a class="gm ghost" target="_blank" rel="noopener" href="${gmaps(lat,lon)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Voir le lieu</a>
  </div>`;
}

function drawCourse(r){
  ensureMap();
  if(courseLayer){ map.removeLayer(courseLayer); }
  courseLayer = L.layerGroup().addTo(map);

  // track: white casing + colored line
  L.polyline(r.track, {color:'#ffffff', weight:8, opacity:.9, lineJoin:'round', lineCap:'round'}).addTo(courseLayer);
  L.polyline(r.track, {color:r.color, weight:4.5, opacity:1, lineJoin:'round', lineCap:'round'}).addTo(courseLayer);

  // start / finish
  const a=r.track[0], b=r.track[r.track.length-1];
  const flag = (latlng,txt,col)=>L.marker(latlng,{icon:L.divIcon({className:'',html:
    `<div style="font-family:var(--disp);font-weight:800;font-size:11px;color:#fff;background:${col};border:2px solid #fff;border-radius:6px;padding:2px 6px;box-shadow:0 1px 4px rgba(0,0,0,.5);white-space:nowrap">${txt}</div>`,
    iconSize:[1,1],iconAnchor:[0,22]})}).addTo(courseLayer);
  flag(a,'DÉPART','#111');
  if(Math.abs(a[0]-b[0])>0.0006||Math.abs(a[1]-b[1])>0.0006) flag(b,'ARRIVÉE','#111');

  // word-doc points
  r.points.forEach(p=>{
    L.marker([p.lat,p.lon],{icon:badgeIcon(p.cat,p.code),riseOnHover:true,title:p.code})
      .addTo(courseLayer)
      .bindPopup(popupHtml(p.cat,p.code,p.label,p.lat,p.lon),{closeButton:true});
  });
  // extra ravitos (supr'amt)
  (r.extra_ravitos||[]).forEach(p=>{
    L.marker([p.lat,p.lon],{icon:badgeIcon('RAVITO',''),riseOnHover:true,title:p.label})
      .addTo(courseLayer)
      .bindPopup(popupHtml('RAVITO',p.label,'',p.lat,p.lon),{closeButton:true});
  });

  map.fitBounds(L.latLngBounds(r.track),{padding:[55,55]});
  buildLegend(r);
}

/* ---------- legend ---------- */
function buildLegend(r){
  const cats = ['S','PS','R'];
  if(r.extra_ravitos) cats.push('RAVITO');
  let rows = `<div class="row"><span class="gly tr" style="color:${r.color}"></span>Tracé ${r.name}</div>`;
  cats.forEach(k=>{
    const c=CAT[k];
    rows += `<div class="row"><span class="gly ${c.shape}" style="background:${k==='RAVITO'?'transparent':c.hex};${k==='RAVITO'?`border-color:${c.hex}`:''}"></span>${c.name}</div>`;
  });
  document.getElementById('legBody').innerHTML = rows;
}
const legend = document.getElementById('legend');
const legHead = document.getElementById('legHead');
const isMobile = ()=>matchMedia('(max-width:560px)').matches;
function setLegend(collapsed){
  legend.classList.toggle('collapsed', collapsed);
  legHead.textContent = collapsed ? 'Légende ＋' : 'Légende －';
}
legHead.addEventListener('click',()=>setLegend(!legend.classList.contains('collapsed')));

  b.style.setProperty('--c', r.color);
  b.addEventListener('click',()=>openCourse(r.id));
  switcher.appendChild(b);
});

/* ---------- navigation ---------- */
function openCourse(id){
  const r = DATA.races.find(x=>x.id===id);
  document.getElementById('home').classList.add('hide');
  const mv=document.getElementById('mapview'); mv.classList.remove('hide'); mv.setAttribute('aria-hidden','false');
  document.getElementById('mvCode').textContent=r.name;
  document.getElementById('mvFull').textContent=r.full;
  document.getElementById('mvDot').style.background=r.color;
  [...switcher.children].forEach(p=>{ p.classList.toggle('active', p.dataset.id===id); });
  ensureMap();
  setTimeout(()=>{ map.invalidateSize(); drawCourse(r); setLegend(isMobile()); },60);
  location.hash = id;
  document.title = `${r.name} — ${r.full} · Suivi AMT 2026`;
}
function goHome(){
  document.getElementById('mapview').classList.add('hide');
  document.getElementById('mapview').setAttribute('aria-hidden','true');
  document.getElementById('home').classList.remove('hide');
  location.hash=''; document.title='AMT 2026 — Suivi des points';
}
document.getElementById('back').addEventListener('click',goHome);
window.addEventListener('hashchange',()=>{
  const id=location.hash.replace('#','');
  if(id && DATA.races.some(r=>r.id===id)) openCourse(id); else goHome();
});
// deep-link on load
window.addEventListener('load',()=>{
  const id=location.hash.replace('#','');
  if(id && DATA.races.some(r=>r.id===id)) openCourse(id);
});
</script>
</body>
</html>
